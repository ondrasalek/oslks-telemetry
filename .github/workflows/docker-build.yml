name: Build and Push Docker Images

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - 'frontend-react/**'
            - '.github/workflows/docker-build.yml'
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/oslks-collector:latest
                      ghcr.io/${{ github.repository_owner }}/oslks-collector:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build and push frontend
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend-react
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/oslks-frontend:latest
                      ghcr.io/${{ github.repository_owner }}/oslks-frontend:${{ github.sha }}
                  build-args: |
                      VITE_APP_URL=${{ secrets.VITE_APP_URL || 'https://radar.slks.cz' }}
                      VITE_OSLKS_COLLECTOR_URL=${{ secrets.VITE_OSLKS_COLLECTOR_URL || 'https://radar.slks.cz' }}
                      VITE_OSLKS_WEBSITE_ID=${{ secrets.VITE_OSLKS_WEBSITE_ID || 'default' }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
