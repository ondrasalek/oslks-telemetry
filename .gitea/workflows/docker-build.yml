name: Build and Push Docker Images

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - 'dashboard-api/**'
            - 'frontend-react/**'
            - 'docker-compose.yml'
            - '.gitea/workflows/docker-build.yml'
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: self-hosted
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Gitea Container Registry
              uses: docker/login-action@v3
              with:
                  registry: git.slks.cz
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITEATOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  push: true
                  tags: |
                      git.slks.cz/oslks/oslks-collector:latest
                      git.slks.cz/oslks/oslks-collector:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=inline

            - name: Build and push dashboard-api
              uses: docker/build-push-action@v6
              with:
                  context: ./dashboard-api
                  push: true
                  tags: |
                      git.slks.cz/oslks/oslks-dashboard-api:latest
                      git.slks.cz/oslks/oslks-dashboard-api:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=inline

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend-react
                  push: true
                  tags: |
                      git.slks.cz/oslks/oslks-frontend:latest
                      git.slks.cz/oslks/oslks-frontend:${{ github.sha }}
                  build-args: |
                      VITE_APP_URL=${{ secrets.VITE_APP_URL || vars.VITE_APP_URL || 'https://radar.slks.cz' }}
                      VITE_OSLKS_COLLECTOR_URL=${{ secrets.VITE_OSLKS_COLLECTOR_URL || vars.VITE_OSLKS_COLLECTOR_URL || 'https://radar.slks.cz' }}
                      VITE_OSLKS_WEBSITE_ID=${{ secrets.VITE_OSLKS_WEBSITE_ID || vars.VITE_OSLKS_WEBSITE_ID || 'default' }}
                  cache-from: type=gha
                  cache-to: type=inline
