name: Build and Push Docker Images to Gitea

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - 'frontend-react/**'
            - 'docker-compose.yml'
            - '.gitea/workflows/docker-build.yml'

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        strategy:
            matrix:
                service: [collector, frontend]
                include:
                    - service: collector
                      context: ./backend
                      image: git.slks.cz/${{ github.repository_owner }}/oslks-collector
                    - service: frontend
                      context: ./frontend-react
                      image: git.slks.cz/${{ github.repository_owner }}/oslks-frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # Note: QEMU/Buildx setup might require specific runner configuration depending on your Gitea setup
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Gitea Container Registry
              uses: docker/login-action@v3
              with:
                  registry: git.slks.cz
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Build and push ${{ matrix.service }}
              uses: docker/build-push-action@v5
              with:
                  context: ${{ matrix.context }}
                  platforms: linux/arm64
                  push: true
                  tags: |
                      ${{ matrix.image }}:latest
                      ${{ matrix.image }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      VITE_APP_URL=${{ vars.VITE_APP_URL }}
                      VITE_OSLKS_COLLECTOR_URL=${{ vars.VITE_OSLKS_COLLECTOR_URL }}
                      VITE_OSLKS_WEBSITE_ID=${{ vars.VITE_OSLKS_WEBSITE_ID }}
