name: Build and Push Docker Images

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - 'frontend-react/**'
            - 'docker-compose.yml'
            - '.gitea/workflows/docker-build.yml'

jobs:
    build-backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Gitea Container Registry
              uses: docker/login-action@v3
              with:
                  registry: git.slks.cz
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITEATOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  platforms: linux/arm64
                  push: true
                  tags: |
                      git.slks.cz/oslks/oslks-collector:latest
                      git.slks.cz/oslks/oslks-collector:${{ github.sha }}
                  cache-from: type=registry,ref=git.slks.cz/oslks/oslks-collector:cache

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Gitea Container Registry
              uses: docker/login-action@v3
              with:
                  registry: git.slks.cz
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITEATOKEN }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend-react
                  platforms: linux/arm64
                  push: true
                  tags: |
                      git.slks.cz/oslks/oslks-frontend:latest
                      git.slks.cz/oslks/oslks-frontend:${{ github.sha }}
                  cache-from: type=registry,ref=git.slks.cz/oslks/oslks-frontend:cache
                  build-args: |
                      VITE_APP_URL=${{ vars.VITE_APP_URL }}
                      VITE_OSLKS_COLLECTOR_URL=${{ vars.VITE_OSLKS_COLLECTOR_URL }}
                      VITE_OSLKS_WEBSITE_ID=${{ vars.VITE_OSLKS_WEBSITE_ID }}
