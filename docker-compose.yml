    # --- 2. Backend (Rust Collector) ---
    backend:
        image: ${IMAGE_COLLECTOR:-ghcr.io/ondrasalek/oslks-collector:latest}
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: oslks-backend
        restart: unless-stopped
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://${SERVICE_USER_POSTGRES:-user}:${SERVICE_PASSWORD_POSTGRES:-pass}@postgresql:5432/${POSTGRES_DB:-oslks_telemetry}}
            HOST: 0.0.0.0
            PORT: 8080
            SESSION_SECRET: $SESSION_SECRET
            CORS_ALLOWED_ORIGINS: $CORS_ALLOWED_ORIGINS
            RUST_LOG: $RUST_LOG

            # GeoIP is built into the image at /app/GeoLite2-City.mmdb
            GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/GeoLite2-City.mmdb}

            # SMTP Settings
            SMTP_HOST: $SMTP_HOST
            SMTP_PORT: $SMTP_PORT
            SMTP_USER: $SMTP_USER
            SMTP_PASSWORD: $SMTP_PASSWORD
            SMTP_FROM_EMAIL: $SMTP_FROM_EMAIL
            SMTP_FROM_NAME: $SMTP_FROM_NAME

        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - coolify

    # --- 3. Frontend (React SPA + Nginx) ---
    frontend:
        image: ${IMAGE_FRONTEND:-ghcr.io/ondrasalek/oslks-frontend:latest}
        build:
            context: ./frontend-react
            dockerfile: Dockerfile
            args:
                VITE_APP_URL: $VITE_APP_URL
                VITE_OSLKS_COLLECTOR_URL: $VITE_OSLKS_COLLECTOR_URL
                VITE_OSLKS_WEBSITE_ID: $VITE_OSLKS_WEBSITE_ID
        container_name: oslks-frontend
        restart: unless-stopped
        environment:
            COLLECTOR_INTERNAL_URL: http://oslks-backend:8080
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1/']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - coolify

# volumes:
#     postgres_data:

networks:
    coolify:
        external: true
