services:
    # --- 1. Database (TimescaleDB) ---
    db:
        image: timescale/timescaledb:latest-pg16
        container_name: oslks-db
        restart: unless-stopped
        shm_size: 1gb # CRITICAL: Essential for TimescaleDB batch inserts
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: '1G'
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-oslks}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-oslks}'
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - coolify

    # --- 2. Backend (Rust Collector) ---
    backend:
        image: 'git.slks.cz/oslks/oslks-collector:latest'
        container_name: oslks-backend
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: '256M'
        environment:
            DATABASE_URL: ${DATABASE_URL:-}
            SESSION_SECRET: ${SESSION_SECRET:-}
            CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
            RUST_LOG: ${RUST_LOG:-info}
            GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/GeoLite2-City.mmdb}
            SMTP_HOST: ${SMTP_HOST:-}
            SMTP_PORT: ${SMTP_PORT:-}
            SMTP_USER: ${SMTP_USER:-}
            SMTP_PASSWORD: ${SMTP_PASSWORD:-}
            SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
            SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test:
                - CMD
                - curl
                - '-f'
                - 'http://127.0.0.1:8080/health'
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - coolify

    dashboard-api:
        image: 'git.slks.cz/oslks/oslks-dashboard-api:latest'
        container_name: oslks-dashboard-api
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: '256M'
        depends_on:
            backend:
                condition: service_healthy
        environment:
            DATABASE_URL: ${DATABASE_URL:-}
            SESSION_SECRET: ${SESSION_SECRET:-}
            CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
            PORT: 8081
            NODE_ENV: production
        healthcheck:
            test: 'wget -qO- http://127.0.0.1:8081/health || exit 1'
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - coolify

    # --- 4. Frontend (React SPA) ---
    frontend:
        image: 'git.slks.cz/oslks/oslks-frontend:latest'
        container_name: oslks-frontend
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    cpus: '0.2'
                    memory: '128M'
        depends_on:
            backend:
                condition: service_healthy
            dashboard-api:
                condition: service_healthy
        labels:
            - traefik.enable=true
            - traefik.http.routers.oslks-frontend.rule=Host(`radar.slks.cz`)
            - traefik.http.routers.oslks-frontend.entrypoints=websecure
            - traefik.http.routers.oslks-frontend.tls.certresolver=letsencrypt
            - traefik.http.routers.oslks-frontend.middlewares=
            - traefik.http.routers.oslks-frontend-http.rule=Host(`radar.slks.cz`)
            - traefik.http.routers.oslks-frontend-http.entrypoints=web
            - traefik.http.routers.oslks-frontend-http.middlewares=
            - traefik.http.services.oslks-frontend.loadbalancer.server.port=80
        healthcheck:
            test:
                - CMD-SHELL
                - 'wget --spider -q http://127.0.0.1:80/ || exit 1'
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - coolify

volumes:
    postgres_data:

networks:
    coolify:
        external: true
