services:
    # --- 1. Database (TimescaleDB) ---
    postgresql:
        image: timescale/timescaledb:latest-pg16
        container_name: oslks-db
        restart: always
        environment:
            POSTGRES_USER: $SERVICE_USER_POSTGRES
            POSTGRES_PASSWORD: $SERVICE_PASSWORD_POSTGRES
            POSTGRES_DB: ${POSTGRES_DB:-oslks_telemetry}
        volumes:
            - postgres_data:/home/postgres/pgdata/data
        ports:
            # Dashboard DB port (default 5432)
            - '${DB_PORT:-5432}:5432'
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - oslks-net

    # --- 2. Backend (Rust Collector) ---
    collector:
        image: ${IMAGE_COLLECTOR:-ghcr.io/ondrasalek/oslks-collector:latest}
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: oslks-collector
        restart: unless-stopped
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://${SERVICE_USER_POSTGRES:-user}:${SERVICE_PASSWORD_POSTGRES:-pass}@postgresql:5432/${POSTGRES_DB:-oslks_telemetry}}
            HOST: 0.0.0.0
            PORT: 8080
            SESSION_SECRET: $SESSION_SECRET
            CORS_ALLOWED_ORIGINS: $CORS_ALLOWED_ORIGINS
            RUST_LOG: $RUST_LOG

            # GeoIP (defaulting to mounted city DB)
            GEOIP_DB_PATH: /data/GeoLite2-City.mmdb

            # SMTP Settings
            SMTP_HOST: $SMTP_HOST
            SMTP_PORT: $SMTP_PORT
            SMTP_USER: $SMTP_USER
            SMTP_PASSWORD: $SMTP_PASSWORD
            SMTP_FROM_EMAIL: $SMTP_FROM_EMAIL
            SMTP_FROM_NAME: $SMTP_FROM_NAME

        volumes:
            - ./backend/src/data/GeoLite2-City.mmdb:/data/GeoLite2-City.mmdb:ro
        depends_on:
            postgresql:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - oslks-net

    # --- 3. Frontend (React SPA + Nginx) ---
    frontend:
        image: ${IMAGE_FRONTEND:-ghcr.io/ondrasalek/oslks-frontend:latest}
        build:
            context: ./frontend-react
            dockerfile: Dockerfile
            args:
                VITE_APP_URL: $VITE_APP_URL
                VITE_OSLKS_COLLECTOR_URL: $VITE_OSLKS_COLLECTOR_URL
                VITE_OSLKS_WEBSITE_ID: $VITE_OSLKS_WEBSITE_ID
        container_name: oslks-frontend
        restart: unless-stopped
        environment:
            COLLECTOR_INTERNAL_URL: http://oslks-collector:8080
        depends_on:
            collector:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3000/']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - oslks-net

volumes:
    postgres_data:

networks:
    oslks-net:
        driver: bridge
