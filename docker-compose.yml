services:
    # --- 1. Database (TimescaleDB) ---
    db:
        image: timescale/timescaledb:latest-pg16
        container_name: oslks-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-oslks}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-oslks}',
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - coolify

    # --- 2. Backend (Rust Collector) ---
    backend:
        image: ${IMAGE_COLLECTOR:-ghcr.io/ondrasalek/oslks-collector:latest}
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: oslks-backend
        restart: unless-stopped
        environment:
            DATABASE_URL: ${DATABASE_URL}
            HOST: 0.0.0.0
            PORT: 8080
            SESSION_SECRET: $SESSION_SECRET
            CORS_ALLOWED_ORIGINS: $CORS_ALLOWED_ORIGINS
            RUST_LOG: $RUST_LOG
            GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/GeoLite2-City.mmdb}
            SMTP_HOST: $SMTP_HOST
            SMTP_PORT: $SMTP_PORT
            SMTP_USER: $SMTP_USER
            SMTP_PASSWORD: $SMTP_PASSWORD
            SMTP_FROM_EMAIL: $SMTP_FROM_EMAIL
            SMTP_FROM_NAME: $SMTP_FROM_NAME
        depends_on:
            db:
                condition: service_healthy

        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - coolify

    # --- 2. Frontend (React SPA) ---
    frontend:
        image: ${IMAGE_FRONTEND:-ghcr.io/ondrasalek/oslks-frontend:latest}
        build:
            context: ./frontend-react
            dockerfile: Dockerfile
            args:
                VITE_APP_URL: $VITE_APP_URL
                VITE_OSLKS_COLLECTOR_URL: $VITE_OSLKS_COLLECTOR_URL
                VITE_OSLKS_WEBSITE_ID: $VITE_OSLKS_WEBSITE_ID
        container_name: oslks-frontend
        restart: unless-stopped
        environment:
            COLLECTOR_INTERNAL_URL: http://backend:8080
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1/ || exit 1']
            interval: 5s
            timeout: 20s
            retries: 10
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.oslks-frontend.rule=Host(`${FQDN:-radar.slks.cz}`)'
            - 'traefik.http.routers.oslks-frontend.entrypoints=websecure'
            - 'traefik.http.routers.oslks-frontend.tls.certresolver=letsencrypt'
            - 'traefik.http.routers.oslks-frontend.middlewares='
            - 'traefik.http.routers.oslks-frontend-http.rule=Host(`${FQDN:-radar.slks.cz}`)'
            - 'traefik.http.routers.oslks-frontend-http.entrypoints=web'
            - 'traefik.http.routers.oslks-frontend-http.middlewares='
            - 'traefik.http.services.oslks-frontend.loadbalancer.server.port=80'
        networks:
            - coolify

volumes:
    postgres_data:

networks:
    coolify:
        external: true
